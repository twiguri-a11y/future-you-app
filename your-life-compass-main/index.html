<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Future You</title>
    <meta
      name="description"
      content="Meet who you're becoming. Your future self already exists. This is where you begin."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="landing-page">
      <header class="nav">
        <a href="#" class="brand">
          <span class="brand-logo" aria-hidden="true">
            <span class="logo-glow"></span>
            <span class="logo-mark">F</span>
          </span>
          <span class="brand-name">Future You</span>
        </a>
        <nav class="nav-actions" aria-label="Quick actions">
          <a href="#" class="ghost-link">EN</a>
          <a href="#" class="icon-link" aria-label="Toggle theme">◐</a>
        </nav>
      </header>

      <section class="hero-content">
        <h1 class="title">Meet who you're becoming</h1>
        <p class="subtitle">Your future self already exists. This is where you begin.</p>
        <a href="#onboarding" class="cta" id="startOnboarding">Start becoming</a>
      </section>
    </main>

    <div class="onboarding-overlay" id="onboarding" aria-hidden="true">
      <section class="onboarding-card" role="dialog" aria-modal="true" aria-labelledby="obTitle">
        <button class="ob-back" type="button" id="obBack" aria-label="Back">
          <span class="ob-back-arrow" aria-hidden="true">←</span>
          <span class="ob-back-text">Back</span>
        </button>

        <div class="ob-header">
          <div class="ob-kicker" id="obKicker" aria-hidden="true"></div>
          <h2 class="ob-title" id="obTitle"></h2>
          <p class="ob-subtitle" id="obSubtitle"></p>
        </div>

        <div class="ob-body">
          <div class="ob-options" id="obOptions" aria-label="Options"></div>

          <div class="ob-add" id="obAddWrap">
            <input
              class="ob-add-input"
              id="obAddInput"
              type="text"
              inputmode="text"
              autocomplete="off"
              placeholder="Add your own..."
              aria-label="Add your own option"
            />
          </div>
        </div>

        <div class="ob-footer">
          <div class="ob-progress" aria-label="Progress">
            <span class="ob-progress-dot" id="obDot1" aria-hidden="true"></span>
            <span class="ob-progress-dot" id="obDot2" aria-hidden="true"></span>
          </div>
          <button class="ob-continue" type="button" id="obContinue">Continue</button>
        </div>
      </section>
    </div>

    <script>
      (function () {
        var MAX_SELECTIONS = 3;

        var overlay = document.getElementById("onboarding");
        var start = document.getElementById("startOnboarding");
        var backBtn = document.getElementById("obBack");
        var continueBtn = document.getElementById("obContinue");
        var kickerEl = document.getElementById("obKicker");
        var titleEl = document.getElementById("obTitle");
        var subtitleEl = document.getElementById("obSubtitle");
        var optionsEl = document.getElementById("obOptions");
        var addWrap = document.getElementById("obAddWrap");
        var addInput = document.getElementById("obAddInput");
        var dots = [document.getElementById("obDot1"), document.getElementById("obDot2")];

        var state = {
          stepIndex: 0,
          selectionsByStep: {},
        };

        var steps = [
          {
            key: "becoming",
            title: "Who are you becoming?",
            subtitle: "Choose up to 3 qualities.",
            showAdd: false,
            options: [
              "Confident & grounded",
              "Disciplined & consistent",
              "Calm & in control",
              "Focused & productive",
              "Healthy & energized",
              "Financially free",
              "Purpose-driven",
              "Becoming my best self",
            ],
          },
          {
            key: "focus",
            title: "What do you want to focus on?",
            subtitle: "Pick up to 3 areas. Add your own if needed.",
            showAdd: true,
            options: ["happy", "Clarity", "Confidence", "Health", "Relationships", "Career", "Purpose"],
          },
        ];

        function normalizeWhitespace(text) {
          return String(text || "")
            .trim()
            .replace(/\s+/g, " ");
        }

        function getSelectedForStep(stepKey) {
          var raw = state.selectionsByStep[stepKey];
          if (Array.isArray(raw)) return raw.slice();
          if (raw != null && raw !== "") return [String(raw)];
          return [];
        }

        function setSelectedForStep(stepKey, arr) {
          state.selectionsByStep[stepKey] = Array.isArray(arr) ? arr.slice(0, MAX_SELECTIONS) : [];
        }

        function hasLabel(selections, label) {
          var lower = String(label).toLowerCase();
          return selections.some(function (s) {
            return String(s).toLowerCase() === lower;
          });
        }

        function pushWithMax(list, label) {
          if (hasLabel(list, label)) return list;
          var next = list.slice();
          if (next.length >= MAX_SELECTIONS) next.shift();
          next.push(label);
          return next;
        }

        function togglePill(stepKey, label) {
          var list = getSelectedForStep(stepKey);
          var idx = list.indexOf(label);
          if (idx >= 0) {
            list.splice(idx, 1);
            setSelectedForStep(stepKey, list);
            return;
          }
          if (list.length >= MAX_SELECTIONS) return;
          list.push(label);
          setSelectedForStep(stepKey, list);
        }

        function flushCustomInputIfNeeded() {
          var step = steps[state.stepIndex];
          if (!step.showAdd) return;

          var custom = normalizeWhitespace(addInput.value);
          if (!custom) return;

          var lowerSet = new Set(
            step.options.map(function (o) {
              return String(o).toLowerCase();
            })
          );
          if (!lowerSet.has(custom.toLowerCase())) {
            step.options = [custom].concat(step.options);
          }

          var list = getSelectedForStep(step.key);
          setSelectedForStep(step.key, pushWithMax(list, custom));
          addInput.value = "";
        }

        function render() {
          var step = steps[state.stepIndex];
          var selections = getSelectedForStep(step.key);

          overlay.setAttribute("aria-hidden", "false");
          overlay.classList.add("is-open");
          document.body.classList.add("modal-open");

          kickerEl.textContent = state.stepIndex + 1 + " / " + steps.length;
          titleEl.textContent = step.title;
          subtitleEl.textContent = step.subtitle;
          addWrap.style.display = step.showAdd ? "" : "none";

          dots.forEach(function (d, i) {
            if (!d) return;
            d.classList.toggle("is-active", i === state.stepIndex);
          });

          optionsEl.innerHTML = "";
          step.options.forEach(function (label) {
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "ob-chip";
            btn.textContent = label;

            var selected = selections.indexOf(label) >= 0;
            btn.classList.toggle("is-selected", selected);
            btn.setAttribute("aria-pressed", selected ? "true" : "false");

            btn.addEventListener("click", function () {
              togglePill(step.key, label);
              render();
            });

            optionsEl.appendChild(btn);
          });
        }

        function close() {
          overlay.classList.remove("is-open");
          overlay.setAttribute("aria-hidden", "true");
          document.body.classList.remove("modal-open");
        }

        function open() {
          state.stepIndex = 0;
          render();
          setTimeout(function () {
            if (addInput && addWrap.style.display !== "none") addInput.focus();
          }, 200);
        }

        start.addEventListener("click", function (e) {
          e.preventDefault();
          open();
        });

        overlay.addEventListener("click", function (e) {
          if (e.target === overlay) close();
        });

        document.addEventListener("keydown", function (e) {
          if (!overlay.classList.contains("is-open")) return;
          if (e.key === "Escape") close();
          if (e.key === "Enter" && (document.activeElement === addInput || document.activeElement === continueBtn)) {
            e.preventDefault();
            continueBtn.click();
          }
        });

        backBtn.addEventListener("click", function () {
          if (state.stepIndex > 0) {
            state.stepIndex -= 1;
            render();
            return;
          }
          close();
        });

        continueBtn.addEventListener("click", function () {
          flushCustomInputIfNeeded();
          if (state.stepIndex < steps.length - 1) {
            state.stepIndex += 1;
            render();
            if (addInput && addWrap.style.display !== "none") addInput.focus();
            return;
          }
          close();
        });
      })();
    </script>
  </body>
</html>
